<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>𝔞𝖗𝔱</title>
  <style>
    body.page-i {
      /* keep your base bg color but add a tiled image on top */
      background-color: var(--bg);

      /* your tile image (ONLY for this page) */
      background-image: url("../../images/bg/033C.jpg");
      background-repeat: repeat;

      /* optional: helps keep it steady while scrolling */
      background-attachment: fixed;
    }

    body.page-i::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;

    background-image: url("../../images/bg/064C.jpg");
    background-repeat: repeat;
    background-size: 256px 256px;

    opacity: 0.25;   /* 👈 change this value */
    z-index: -1;
    }

    @media (max-width: 768px) {
      body.page-i {
        background-attachment: scroll;
      }
    }

  </style>

  <!-- your second stylesheet -->
  <link rel="stylesheet" href="../../2ndstyle.css">
</head>

<body>

  <body class="page-i"></body>

  <div class="stack">

    <!-- Panel 1 -->
    <section class="panel">
      <div class="panel-content">
        <img src="../../images/arts/the-abandoned-house-haunted-study.jpg" alt="house" loading="lazy" style="max-width: 100%; width: 400px; height: auto;" />
        <img src="../../images/arts/the-lost-selenelion-sword.jpg" alt="sword" loading="lazy" style="max-width: 100%; width: 400px; height: auto;" />
      </div>
    </section>

    <!-- Panel 2 -->
    <section class="panel">

        <div class="panel-content">
          <img src="../../images/arts/the-frozen-valley.jpg" alt="fv" loading="lazy" style="max-width: 100%; width: 400px; height: auto;" />
        </div>

    </section>

  </div>

  <a class="return-btn" href="artshome.html">__𝖗𝔢𝖙𝔲𝖗𝔫__;</a>

</body>

</html>
